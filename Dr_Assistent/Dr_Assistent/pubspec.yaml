name: dr_assistant
description: A Flutter app for managing doctor-patient records with Google Drive integration.

publish_to: 'none' # Remove if publishing to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  photo_view: ^0.15.0

  url_launcher: ^6.1.11
  # Database (Local)
  sqflite: ^2.2.8
  path: ^1.8.3
  # Local storage paths
  path_provider: ^2.0.14

  google_sign_in: ^6.1.5
  googleapis: ^13.0.0
  googleapis_auth: ^1.6.0

  # File and image handling
  file_picker: ^10.3.3
  image_picker: ^0.8.7+4


  # State management
  provider: ^6.1.2

  # UI components
  cupertino_icons: ^1.0.8
  intl: ^0.19.0

  # (Optional) For user preferences or saving login sessions
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
