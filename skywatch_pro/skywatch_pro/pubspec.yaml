name: skywatch_pro
description: Professional Weather App with Advanced Features
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP requests for weather API
  http: ^1.2.1

  # Local storage / shared preferences
  shared_preferences: ^2.2.3

  # GPS / Location
  geolocator: ^12.0.0

  # Charts for hourly forecast graphs
  fl_chart: ^0.65.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Add fonts if needed (optional)
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: fonts/Roboto-Regular.ttf